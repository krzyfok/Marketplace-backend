
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=test
# Server / SSL
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=myapp

# Spring application
spring.application.name=marketplace

# Database
#docker to docker
#spring.datasource.url=jdbc:mysql://mysql-db:3306/marketplace
#spring.datasource.username=root
#spring.datasource.password=root
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#local to docker
spring.datasource.url=jdbc:mysql://localhost:3306/marketplace
spring.datasource.username=appuser
spring.datasource.password=appuser123
spring.jpa.hibernate.ddl-auto=update

#server.port=8080

# Security / JWT
security.jwt.secret=${JWT_SECRET}
security.jwtExpirationMs=3600000
